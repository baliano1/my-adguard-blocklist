name: Aggiornamento Feed OSINT

on:
  schedule:
    - cron: '0 */3 * * *'  # Esegue al minuto 0 di ogni ora divisibile per 3 (0, 3, 6, 9, ecc.)
  workflow_dispatch:
  
permissions:
  contents: write

jobs:
  aggiorna-blocklist:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install requests

      - name: Run script
        run: python update_list.py

      - name: Commit and Push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action Bot"
          git add filtri-personali.txt
          git diff --quiet && git diff --staged --quiet || (git commit -m "OSINT Update: $(date +'%Y-%m-%d')" && git push)
